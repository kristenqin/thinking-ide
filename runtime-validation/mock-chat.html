<!doctype html>
<html lang="en" data-thinking-ide-runtime-validation="true">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runtime Validation - ChatGPT</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Display", "Inter", system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(34, 197, 94, 0.16), transparent 32%),
          linear-gradient(180deg, #f8fbff, #eef4fb);
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      .mock-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-shell {
        width: min(960px, calc(100vw - 64px));
        margin: 0 auto;
        padding: 32px 32px 40px;
      }

      .chat-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      .chat-header h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.05;
      }

      .chat-header p {
        margin: 0;
        color: #475569;
        line-height: 1.6;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 12px;
        max-width: 360px;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #2563eb, #0f766e);
        color: white;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
      }

      .mock-notes {
        margin-bottom: 24px;
        padding: 18px 20px;
        border-radius: 24px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(255, 255, 255, 0.8);
        color: #475569;
        line-height: 1.65;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.06);
      }

      #chat-root {
        display: grid;
        gap: 16px;
      }

      .message {
        border-radius: 20px;
        padding: 18px 20px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.06);
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(255, 255, 255, 0.94);
      }

      .message[data-message-author-role="assistant"] {
        background: rgba(240, 249, 255, 0.98);
      }

      .meta {
        margin-bottom: 8px;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #0f766e;
      }

      .chat-input {
        margin-top: 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px 20px;
        border-radius: 24px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.06);
      }

      .chat-input__field {
        flex: 1 1 auto;
        min-height: 20px;
        color: #64748b;
      }

      .chat-input__send {
        flex: 0 0 auto;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.08);
        color: #0f172a;
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <script>
      const scenario = new URLSearchParams(location.search).get("scenario") ?? "split-pane";
      let chatRoot = null;
      let exchangeCount = 0;
      let assistantCount = 0;

      function appendMessage(role, id, text) {
        if (!(chatRoot instanceof HTMLElement)) {
          throw new Error("Mock host has not been bootstrapped yet");
        }

        const article = document.createElement("article");
        article.className = "message";
        if (id) {
          article.id = id;
        }
        article.setAttribute("data-message-author-role", role);
        article.innerHTML = `<div class="meta">${role}</div>${text}`;
        chatRoot.appendChild(article);
      }

      function wireControls(root) {
        root.querySelector("#append-exchange")?.addEventListener("click", () => {
          exchangeCount += 1;
          appendMessage(
            "user",
            "",
            `Map the next exchange number ${exchangeCount} and keep user layout edits when the canvas refreshes.`
          );
          appendMessage(
            "assistant",
            "",
            `Exchange ${exchangeCount} should trigger the observer, regenerate the draft, and preserve manual node positions.`
          );
        });

        root.querySelector("#append-assistant")?.addEventListener("click", () => {
          assistantCount += 1;
          appendMessage(
            "assistant",
            "",
            `Assistant follow-up ${assistantCount} adds more detail about source anchoring and runtime validation.`
          );
        });

        root.querySelector("#remove-latest-assistant")?.addEventListener("click", () => {
          const assistants = Array.from(chatRoot?.querySelectorAll('[data-message-author-role="assistant"]') ?? []);
          assistants.at(-1)?.remove();
        });

        root.querySelector("#remove-assistant-sources")?.addEventListener("click", () => {
          Array.from(chatRoot?.querySelectorAll('[data-message-author-role="assistant"]') ?? []).forEach((message) => {
            message.remove();
          });
        });
      }

      function bootstrapMockHost() {
        const existing = document.getElementById("mock-page-root");
        if (existing instanceof HTMLElement) {
          chatRoot = existing.querySelector("#chat-root");
          return existing;
        }

        const pageRoot = document.createElement("div");
        pageRoot.id = "mock-page-root";
        pageRoot.className = "mock-page";
        pageRoot.innerHTML = `
          <main class="chat-shell">
            <section class="chat-header">
              <div>
                <h1>Runtime Validation Host</h1>
                <p>Controlled local page for extension black-box smoke tests.</p>
              </div>
              <div class="controls">
                <button id="append-exchange" type="button">Append Exchange</button>
                <button id="append-assistant" type="button">Append Assistant Follow-up</button>
                <button id="remove-latest-assistant" type="button">Remove Latest Assistant</button>
                <button id="remove-assistant-sources" type="button">Remove Assistant Sources</button>
              </div>
            </section>

            <section class="mock-notes">
              This page intentionally mimics the minimum message DOM that the extension currently understands. The
              runtime harness uses it to verify injection, split-pane layout, concept-map rendering, and refresh after
              new chat content appears.
            </section>

            <section id="chat-root" aria-live="polite"></section>

            <section class="chat-input" aria-label="Message input mock">
              <div class="chat-input__field">Message input...</div>
              <div class="chat-input__send">Send</div>
            </section>
          </main>
        `;

        document.body.appendChild(pageRoot);
        chatRoot = pageRoot.querySelector("#chat-root");
        wireControls(pageRoot);

        appendMessage(
          "user",
          "user_seed",
          "I need a concept map for how the runtime spine behaves during message refresh."
        );
        appendMessage(
          "assistant",
          "assistant_seed",
          "Start with the chat scan. Then map the draft generation. Then show how local persistence restores user work."
        );

        return pageRoot;
      }

      window.__thinkingIdeBootstrapMockHost = bootstrapMockHost;
      window.__thinkingIdeRuntimeScenario = scenario;

      if (scenario !== "overlay-fallback") {
        bootstrapMockHost();
      }
    </script>
  </body>
</html>
